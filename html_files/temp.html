<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>—</title>
    <link rel="stylesheet" href="/app/theme.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .empty {
            text-align: center;
            color: var(--text-faint);
            padding: 40px 20px;
            max-width: 360px;
        }
        .empty-mark {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px dashed var(--border-strong);
            display: grid; place-items: center;
            margin: 0 auto 18px;
            color: var(--text-muted);
            position: relative;
        }
        .empty-mark::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid var(--border);
            opacity: .5;
        }
        .empty-mark svg { width: 22px; height: 22px; stroke-width: 1.5; }
        .empty-title {
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .empty-msg {
            font-size: var(--text-sm);
            color: var(--text-faint);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="empty" role="status">
        <div class="empty-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        </div>
        <div class="empty-title">awaiting input</div>
        <div class="empty-msg">deploy a configuration · or publish to a topic</div>
    </div>
</body>
</html>
